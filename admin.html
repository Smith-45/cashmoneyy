<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ADMIN | CA$HMONEY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#f0f2f5; padding: 20px;">
    <h2>🛠 Panel de Gestion Gédéon</h2>

    <div class="stats-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:15px; margin-bottom:25px;">
        <div class="stat-card" style="border-left:5px solid #007bff; background:white; padding:15px; border-radius:10px;">
            <small>Utilisateurs</small><h3>1,024</h3>
        </div>
        <div class="stat-card" style="border-left:5px solid #28a745; background:white; padding:15px; border-radius:10px;">
            <small>Total Rechargé</small><h3>850,500 F</h3>
        </div>
        <div class="stat-card" style="border-left:5px solid #ffc107; background:white; padding:15px; border-radius:10px;">
            <small>Retraits Attente</small><h3>12</h3>
        </div>
    </div>

    <div class="card">
        <h3>Validation Manuelle des Recharges</h3>
        <table style="width:100%; border-collapse:collapse; margin-top:15px;">
            <thead>
                <tr style="text-align:left; border-bottom:2px solid #eee;">
                    <th>Date & Heure</th>
                    <th>Utilisateur</th>
                    <th>Montant à Créditer</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="adminRequestList">
                <tr style="border-bottom:1px solid #eee;">
                    <td>20/03/2026 14:30</td>
                    <td>Moussa T. (Niv 2)</td>
                    <td><input type="number" value="5000" class="auth-input" style="width:100px; margin:5px 0;"></td>
                    <td>
                        <button onclick="alert('Crédit validé !')" class="btn-action" style="background:#28a745; color:white; padding:5px 10px; border-radius:5px; border:none; cursor:pointer;">Valider</button>
                        <button onclick="prompt('Raison du rejet :')" style="background:#dc3545; color:white; border:none; border-radius:5px; padding:5px 10px; cursor:pointer;">Rejeter</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="admin.js"></script>
</body>
</html>
