<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | CA$HMONEY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#f4f7f6; padding:20px; font-family:sans-serif;">

    <div id="adminContainer" style="max-width: 800px; margin: auto; display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; background:white; padding:15px; border-radius:10px; margin-bottom:20px;">
            <h2 style="margin:0; color:#007bff;">🛠 Panel Gedeon</h2>
            <button onclick="window.location.href='index.html'" style="padding:10px; cursor:pointer;">🏠 Retour Site</button>
        </div>

        <div class="card" style="background:white; padding:20px; border-radius:10px; margin-bottom:20px;">
            <h3>📥 Recharges Payliv</h3>
            <div id="listRecharges">Chargement...</div>
        </div>

        <div class="card" style="background:white; padding:20px; border-radius:10px;">
            <h3>📤 Retraits Mobile</h3>
            <div id="listRetraits">Chargement...</div>
        </div>
    </div>

    <div id="denied" style="text-align:center; margin-top:50px; display:none;">
        <h1 style="color:red;">🚫 Accès Refusé</h1>
        <p>Seul l'administrateur <b>gedeon.yah45@gmail.com</b> peut voir cette page.</p>
        <button onclick="window.location.href='index.html'">Retour à l'accueil</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, increment, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        // TA CONFIGURATION (VERIFIE BIEN CES VALEURS)
        const firebaseConfig = {
            apiKey: "AIzaSyBCExSHkawIHfsmAvyU_3cAQa2JDfaNMeM",
            authDomain: "cashmoney-94740.firebaseapp.com",
            projectId: "cashmoney-94740",
            storageBucket: "cashmoney-94740.firebasestorage.app",
            messagingSenderId: "545930031325",
            appId: "1:545930031325:web:4915222ad0db491081ab34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "gedeon.yah45@gmail.com") {
                document.getElementById('adminContainer').style.display = 'block';
                chargerListes();
            } else {
                document.getElementById('denied').style.display = 'block';
            }
        });

        function chargerListes() {
            // Écoute des Recharges
            onSnapshot(collection(db, "recharges"), (snap) => {
                const div = document.getElementById('listRecharges');
                div.innerHTML = snap.empty ? "Aucune recharge en attente." : "";
                snap.forEach(d => {
                    const data = d.data();
                    div.innerHTML += `
                    <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                        <span>ID: <b>${data.transactionID}</b></span>
                        <div>
                            <button onclick="validerRec('${d.id}','${data.userId}')" style="background:green; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Valider</button>
                            <button onclick="bannir('${data.userId}')" style="background:black; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">🚫</button>
                        </div>
                    </div>`;
                });
            });

            // Écoute des Retraits
            onSnapshot(collection(db, "retraits"), (snap) => {
                const div = document.getElementById('listRetraits');
                div.innerHTML = snap.empty ? "Aucun retrait demandé." : "";
                snap.forEach(d => {
                    const data = d.data();
                    div.innerHTML += `
                    <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                        <span>${data.montant} F sur <b>${data.telephone || 'Non spécifié'}</b></span>
                        <div>
                            <button onclick="validerRetrait('${d.id}','${data.userId}', ${data.montant})" style="background:blue; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Payé</button>
                            <button onclick="bannir('${data.userId}')" style="background:black; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">🚫</button>
                        </div>
                    </div>`;
                });
            });
        }

        // FONCTIONS GLOBALES (attachées à window pour les boutons)
        window.validerRec = async (id, uid) => {
            try {
                await updateDoc(doc(db, "users", uid), { solde: increment(1000) });
                await addDoc(collection(db, "notifications"), { userId: uid, message: "Recharge de 1000F validée ! ✅", date: serverTimestamp() });
                await deleteDoc(doc(db, "recharges", id));
                alert("Utilisateur crédité !");
            } catch(e) { alert("Erreur: Vérifiez vos règles Firestore."); }
        };

        window.validerRetrait = async (id, uid, montant) => {
            try {
                await addDoc(collection(db, "notifications"), { userId: uid, message: `Votre retrait de ${montant}F a été payé ! 💸`, date: serverTimestamp() });
                await deleteDoc(doc(db, "retraits", id));
                alert("Retrait archivé.");
            } catch(e) { alert("Erreur."); }
        };

        window.bannir = async (uid) => {
            if(confirm("Bannir définitivement ?")) {
                await updateDoc(doc(db, "users", uid), { statut: "banni" });
                alert("Utilisateur banni.");
            }
        };

    </script>
</body>
</html>
